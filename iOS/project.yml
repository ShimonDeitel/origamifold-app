name: OrigamiFold
options:
  bundleIdPrefix: com.shimondeitel.origamifold
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  OrigamiFold:
    type: application
    platform: iOS
    sources:
      - path: OrigamiFold
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.origamifold
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: OrigamiFold/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OrigamiFoldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OrigamiFoldTests
      - path: OrigamiFold.storekit
    dependencies:
      - target: OrigamiFold
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.origamifold.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OrigamiFoldUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OrigamiFoldUITests
    dependencies:
      - target: OrigamiFold
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.origamifold.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  OrigamiFold:
    build:
      targets:
        OrigamiFold: all
        OrigamiFoldTests: [test]
        OrigamiFoldUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: OrigamiFold.storekit
    test:
      config: Debug
      storeKitConfiguration: OrigamiFold.storekit
      targets:
        - OrigamiFoldTests
        - OrigamiFoldUITests
    archive:
      config: Release
